name: Build & Release

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'Formula/**'
      - 'Casks/**'

jobs:
  build-and-release:
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          LATEST=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          MAJOR=$(echo "$LATEST" | sed 's/v//' | cut -d. -f1)
          MINOR=$(echo "$LATEST" | sed 's/v//' | cut -d. -f2)
          PATCH=$(echo "$LATEST" | sed 's/v//' | cut -d. -f3)
          NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_TAG"

      - name: Inject version into source
        run: |
          sed -i '' 's/let version = ".*"/let version = "${{ steps.version.outputs.version }}"/' Sources/CleanLock/CLIHelpers.swift

      - name: Run tests
        run: swift test

      - name: Build arm64
        run: swift build -c release --arch arm64

      - name: Build x86_64
        run: swift build -c release --arch x86_64

      - name: Create universal binary
        run: |
          lipo -create \
            .build/arm64-apple-macosx/release/cleanlock \
            .build/x86_64-apple-macosx/release/cleanlock \
            -output cleanlock-universal

      - name: Package
        run: |
          zip cleanlock-macos.zip cleanlock-universal
          SHA256=$(shasum -a 256 cleanlock-macos.zip | awk '{print $1}')
          echo "SHA256=$SHA256" >> $GITHUB_ENV
          echo "SHA256: $SHA256"

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: CleanLock ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            cleanlock-macos.zip
          body: |
            **SHA256:** `${{ env.SHA256 }}`

            ### Install
            ```bash
            brew tap ugurcandede/cleanlock
            brew install cleanlock
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify cleanlock-app to update submodule
        continue-on-error: true
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/ugurcandede/cleanlock-app/dispatches \
            -d '{"event_type":"cleanlock-updated"}'
