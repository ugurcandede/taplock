name: Build & Release

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'Formula/**'
      - 'Casks/**'

jobs:
  build-and-release:
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          LATEST=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          MAJOR=$(echo "$LATEST" | sed 's/v//' | cut -d. -f1)
          MINOR=$(echo "$LATEST" | sed 's/v//' | cut -d. -f2)
          PATCH=$(echo "$LATEST" | sed 's/v//' | cut -d. -f3)

          # Semantic versioning from commit message prefix
          # BREAKING: or bump: → major, feat: → minor, default → patch
          MSG=$(git log -1 --pretty=%s)
          if echo "$MSG" | grep -qiE '^(BREAKING|bump):'; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif echo "$MSG" | grep -qi '^feat:'; then
            MINOR=$((MINOR + 1)); PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_TAG (from: $MSG)"

      - name: Inject version into source
        run: |
          sed -i '' 's/let version = ".*"/let version = "${{ steps.version.outputs.version }}"/' Sources/TapLock/CLIHelpers.swift

      - name: Run tests
        run: swift test

      - name: Build arm64
        run: swift build -c release --arch arm64

      - name: Build x86_64
        run: swift build -c release --arch x86_64

      - name: Create universal binary
        run: |
          lipo -create \
            .build/arm64-apple-macosx/release/taplock \
            .build/x86_64-apple-macosx/release/taplock \
            -output taplock-universal

      - name: Package
        run: |
          zip taplock-macos.zip taplock-universal
          SHA256=$(shasum -a 256 taplock-macos.zip | awk '{print $1}')
          echo "SHA256=$SHA256" >> $GITHUB_ENV
          echo "SHA256: $SHA256"

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: TapLock ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            taplock-macos.zip
          body: |
            **SHA256:** `${{ env.SHA256 }}`

            ### Install
            ```bash
            brew tap ugurcandede/taplock
            brew install taplock
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew formula
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone https://x-access-token:${GH_TOKEN}@github.com/ugurcandede/homebrew-taplock.git /tmp/homebrew-taplock
          cd /tmp/homebrew-taplock
          VERSION="${{ steps.version.outputs.version }}"
          sed -i '' "s|url \".*\"|url \"https://github.com/ugurcandede/taplock/releases/download/v${VERSION}/taplock-macos.zip\"|" Formula/taplock.rb
          sed -i '' "s|sha256 \".*\"|sha256 \"${SHA256}\"|" Formula/taplock.rb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/taplock.rb
          git commit -m "Update taplock formula to v${VERSION}"
          git push

      - name: Notify taplock-app to update submodule
        continue-on-error: true
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.HOMEBREW_TAP_TOKEN }}" \
            https://api.github.com/repos/ugurcandede/taplock-app/dispatches \
            -d '{"event_type":"taplock-updated"}'
